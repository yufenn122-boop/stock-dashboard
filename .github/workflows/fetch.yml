name: Fetch Stock Indices

on:
  schedule:
    # 美股：北京时间 08:00 = UTC 00:00，周一到周五
    - cron: '0 0 * * 1-5'
    # A股：北京时间 15:10 = UTC 07:10，周一到周五
    - cron: '10 7 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'us / cn / all'
        required: false
        default: 'all'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance akshare psycopg2-binary python-dotenv

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 0 * * 1-5" ]; then
            echo "mode=us" >> $GITHUB_OUTPUT
          else
            echo "mode=cn" >> $GITHUB_OUTPUT
          fi

      - name: Fetch indices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python fetch_indices.py ${{ steps.mode.outputs.mode }}
