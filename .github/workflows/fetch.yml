name: Fetch Stock Indices

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'us / cn / all'
        required: false
        default: 'all'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance akshare psycopg2-binary python-dotenv

      - name: Fetch indices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python fetch_indices.py ${{ github.event.inputs.mode || 'all' }}
